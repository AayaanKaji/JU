<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button { margin: 5px; padding: 5px; }
        .addDevice { display: flexbox; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h2>Storage Devices Warehouse</h2>
    
    <div class="addDevice">
        <h3>Add a Device</h3>
        <label>Name: <input type="text" id="name"></label>
        <label>Manufacturer: <input type="text" id="manufacturer"></label>
        <label>Price: <input type="number" id="price"></label>
        <label>Type: <input type="text" id="type"></label>
        <button onclick="addComponent()">Add</button>
    </div>

    <h3>Stored Components</h3>
    <button onclick="showComponents()">Show</button>
    <table id="componentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Manufacturer</th>
                <th>Price</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
